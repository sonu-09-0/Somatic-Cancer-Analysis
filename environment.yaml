name: cancer-somatic-v1



channels:

  - conda-forge      # General scientific packages

  - bioconda         # Bioinformatics tools (priority!)

  - defaults         # Anaconda defaults

dependencies:



  # Workflow Management

  - snakemake-minimal=7.32.4   # Workflow engine (minimal = faster install)

  - mamba=1.5.8               # Fast conda alternative




  # Quality Control

  - fastqc=0.12.1             # Read quality assessment

  - multiqc=1.21              # Aggregate QC reports




  # Alignment & SAM/BAM Processing

  - bwa=0.7.18                # Read alignment (BWA-MEM)

  - samtools=1.21             # SAM/BAM manipulation

  - picard=3.1.1              # BAM QC metrics



  # Variant Calling (GATK Suite)

  - gatk4=4.5.0.0             # GATK 4 (includes Mutect2)

  - bcftools=1.21             # VCF manipulation

  - htslib

  - bcftools

  - samtools                # VCF indexing




  # Variant Annotation

  - ensembl-vep=111           # Variant Effect Predictor

  - snpeff=5.2                # Alternative annotator



  # Python & Core Libraries

  - python=3.10               # Python interpreter

  - pip=24.0                  # Python package manager


  # Data manipulation

  - pandas=2.2.0              # DataFrames

  - numpy=1.26.4              # Numerical computing



  # Bioinformatics

  - pysam=0.22.0              # Python BAM/VCF interface

  - biopython=1.83            # Sequence analysis


  # Visualization

  - matplotlib=3.8.3          # Plotting

  - seaborn=0.13.2            # Statistical visualization

  - plotly=5.18.0             # Interactive plots


  # Reporting

  - jinja2=3.1.3              # HTML templating

  - markdown=3.5.2            # Markdown processing



  # Utilities

  - wget=1.21.4               # File downloads


  - tree=2.1.1                # Directory visualization




  # Development & Testing

  - pytest=8.0.2              # Unit testing

  - black=24.2.0              # Code formatting

  - flake8=7.0.0              # Linting





  # Additional Python Packages (via pip)

  - pip:

    - pyvcf3==1.0.3           # VCF parsing (not in conda)
